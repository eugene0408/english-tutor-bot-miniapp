<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Styles -->
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <!-- Scripts -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/app.js" defer></script>
    <title>English Buddy</title>
  </head>
  <body>
    <div id="toast-notification" class="toast">Saved Successfully ✅</div>
    <section class="wrapper">
      <div class="buttons-group">
        <h1>⚙️ Settings</h1>
        <div class="settings-row">
          <div class="settings-group">
            <h3>Your Level</h3>
            <select name="level" id="level" class="level-select">
              <option value="B1">B1</option>
              <option value="B2">B2</option>
              <option value="C1">C1</option>
              <option value="C2">C2</option>
            </select>
          </div>
          <div class="settings-group">
            <h3>Bot Creativity</h3>
            <div class="creativity-wrapper">
              <button class="creativity-button" id="decreaseTemp">-</button>
              <span id="temperature"></span>
              <button class="creativity-button" id="increaseTemp">+</button>
            </div>
          </div>
        </div>
        <button class="action-button" id="saveSettings">Save Settings</button>
      </div>

      <div class="buttons-group">
        <h1>🚀 Commands</h1>
        <button id="randomQuestBtn" class="action-button">
          🎲 Ask random question
        </button>
        <button id="translatorBtn" class="action-button">
          🌐 Open Translator
        </button>
      </div>
    </section>
    <div class="close-button-wrapper">
      <button id="closeBtn" class="action-button">◀️ Return to chat</button>
    </div>
    <div class="preloader preloader_show" id="preloader">
      <div class="loader"></div>
      <h3>Loading Your Data</h3>
    </div>
  </body>
</html>
